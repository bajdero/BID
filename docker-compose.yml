# BID 2.0.0-rc1 Docker Compose Stack
# POC-01: Docker Compose with Nginx, API, Frontend, FileBrowser
#
# Start:   docker compose up --build -d
# Stop:    docker compose down
# Logs:    docker compose logs -f
#
# Environment variables — copy .env.example to .env before running

services:
  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/bid.sqlite3}
      SECRET_KEY: ${SECRET_KEY}
      PROJECTS_DIR: ${PROJECTS_DIR:-/data/projects}
      CORS_ORIGINS: '["http://localhost", "http://localhost:80"]'
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-2}
    volumes:
      - bid_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── React frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: src/frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  # ── FileBrowser ────────────────────────────────────────────────────────────
  filebrowser:
    image: filebrowser/filebrowser:latest
    volumes:
      - bid_data:/srv
      - filebrowser_db:/database
    environment:
      FB_BASEURL: /files
    expose:
      - "80"
    restart: unless-stopped

volumes:
  bid_data:
  filebrowser_db:
